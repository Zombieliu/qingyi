<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>离线模式</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; }
      .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { max-width: 420px; padding: 24px; border-radius: 12px; background: #111827; color: #fff; box-shadow: 0 10px 30px rgba(0,0,0,.3); }
      .title { font-size: 20px; margin: 0 0 8px; }
      .desc { opacity: .8; line-height: 1.6; }
      .btn { margin-top: 16px; display: inline-block; padding: 10px 16px; background: #22c55e; color: #0b0f19; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">当前离线</h1>
        <p class="desc">网络不可用或请求超时。请检查网络后重试。</p>
        <a class="btn" href="/">返回首页</a>
      </div>
    </div>
  </body>
</html>
