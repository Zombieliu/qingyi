name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm --filter app exec eslint --config packages/app/eslint.config.mjs packages/app/src
      - name: Type check
        run: pnpm --filter app exec tsc --noEmit
      - name: Cloudflare edge import guard
        run: pnpm --filter app run cf:guard

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm --filter app exec vitest run --reporter=verbose

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run coverage
        run: pnpm --filter app exec vitest run --coverage

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: qingyi
          POSTGRES_PASSWORD: qingyi
          POSTGRES_DB: qingyi
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push schema to test DB
        run: pnpm --filter app exec prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://qingyi:qingyi@localhost:5432/qingyi?schema=public
      - name: Run integration tests
        run: pnpm --filter app exec vitest run --reporter=verbose "integration"
        env:
          DATABASE_URL: postgresql://qingyi:qingyi@localhost:5432/qingyi?schema=public

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm --filter app build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          SKIP_ENV_VALIDATION: "1"

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter app exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm --filter app exec playwright test --project=chromium
        env:
          SKIP_ENV_VALIDATION: "1"
          NEXT_TELEMETRY_DISABLED: "1"
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7
